<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Momentum App</title>
</head>
<body>
    <form class="hidden center" id="login-form">
        <input 
            required
            maxlength="15"
            type="text" 
            placeholder="What is your name?"/>
        <button>Log In</button>
    </form>
    <h2 class="center" id="clock">00:00:00</h2>
    <h1 class="hidden center" id="greeting">Hello Sujeong</h1>
    <form class="center" id="todo-form">
        <input required type="text" placeholder="Write a To Do and Press Enter."/>
    </form>
    <ul class="center" id="todo-list"></ul>
    <div class="center" id="quote">
        <span></span>
        <span></span>
    </div>
    <div class="center" id="weather">
        <span></span>
        <span></span>
    </div>
    <script src="js/greeting.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/quotes.js"></script>
    <script src="js/background.js"></script>
    <script src="js/todo.js"></script>
    <script src="js/weather.js"></script>
</body>
</html>
